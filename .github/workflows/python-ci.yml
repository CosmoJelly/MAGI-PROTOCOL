name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check for syntax errors
        run: |
          cd backend
          python -m py_compile main.py
          python -m py_compile agents.py
          python -m py_compile llm.py
          python -m py_compile arbiter.py
          python -m py_compile parser.py

      - name: Verify imports
        run: |
          cd backend
          python -c "import main; import agents; import llm; import arbiter; import parser"
